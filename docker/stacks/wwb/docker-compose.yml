services:
  # ──────────────────────────────────────────────
  # Shepherd — reverse proxy and service monitoring
  # ──────────────────────────────────────────────
  shepherd:
    image: containrrr/shepherd
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    deploy:
      placement:
        constraints:
          - node.role == manager
  # ──────────────────────────────────────────────
  # MongoDB — primary data store
  # ──────────────────────────────────────────────
  mongo:
    image: mongo:latest
    configs:
      - source: mongo-init
        target: /docker-entrypoint-initdb.d/init.js
        mode: 444
    secrets:
      - mongo-root-password
      - mongo-database-password
    volumes:
      - mongo-data:/data/db
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD_FILE: /run/secrets/mongo-root-password
      MONGO_INITDB_DATABASE: wwb-db
      MONGO_INITDB_DATABASE_USERNAME: wwb-service
      MONGO_INITDB_DATABASE_PASSWORD_FILE: /run/secrets/mongo-database-password
    networks:
      - wwb-internal
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
      placement:
        constraints:
          - node.role == manager
  # ──────────────────────────────────────────────
  # Mongo Express — web-based MongoDB admin UI
  # ──────────────────────────────────────────────
  mongo-express:
    image: mongo-express:latest
    entrypoint: ["/bin/sh", "/configs/entrypoint.sh"]
    configs:
      - source: mongo-express-entrypoint
        target: /configs/entrypoint.sh
        mode: 755
    depends_on:
      - mongo
    secrets:
      - mongo-root-password
      - mongo-express-password
    environment:
      ME_CONFIG_SITE_BASEURL: /db
      ME_CONFIG_MONGODB_SERVER: wwb_mongo
      ME_CONFIG_MONGODB_PORT: "27017"
      ME_CONFIG_MONGODB_ENABLE_ADMIN: "true"
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD_FILE: /run/secrets/mongo-root-password
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD_FILE: /run/secrets/mongo-express-password
    networks:
      - wwb-internal
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
  # ──────────────────────────────────────────────
  # Backend — Express + Node.js API
  # ──────────────────────────────────────────────
  backend:
    image: ghcr.io/soriphoono/wwb-backend:latest
    depends_on:
      - mongo
    secrets:
      - mongo-database-password
      - jwt-secret
      - twilio-account-sid
      - twilio-auth-token
      - twilio-verify-service-sid
      - admin-email
      - admin-password
    environment:
      NODE_ENV: production
      API_PORT: 3000
      DEFAULT_ADMIN_EMAIL_FILE: /run/secrets/admin-email
      DEFAULT_ADMIN_PASSWORD_FILE: /run/secrets/admin-password
      MONGO_URI: mongodb://wwb-service:{PASSWORD}@wwb_mongo:27017/wwb-db?authSource=wwb-db
      MONGO_PASSWORD_FILE: /run/secrets/mongo-database-password
      JWT_SECRET_FILE: /run/secrets/jwt-secret
      FRONTEND_ORIGIN: https://wwb.${DOMAIN_NAME}
      TWILIO_ACCOUNT_SID_FILE: /run/secrets/twilio-account-sid
      TWILIO_AUTH_TOKEN_FILE: /run/secrets/twilio-auth-token
      TWILIO_VERIFY_SERVICE_SID_FILE: /run/secrets/twilio-verify-service-sid
    networks:
      - wwb-internal
    volumes:
      - backend-uploads:/app/uploads
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
  # ──────────────────────────────────────────────
  # Frontend — Vue 3 / Caddy static server
  # Caddy proxies /api/* → backend:3000
  # ──────────────────────────────────────────────
  frontend:
    image: ghcr.io/soriphoono/wwb-frontend:latest
    depends_on:
      - backend
    networks:
      - wwb-internal
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
  # ──────────────────────────────────────────────
  # Cloudflared — Cloudflare Tunnel for external access
  # Forwards cloudflare edge → frontend:80
  # ──────────────────────────────────────────────
  cloudflared:
    image: cloudflare/cloudflared:latest
    # Read token from Swarm secret file and pass to cloudflared
    command: tunnel --no-autoupdate run
    depends_on:
      - frontend
    secrets:
      - cloudflare-tunnel-token
    environment:
      TUNNEL_TOKEN_FILE: /run/secrets/cloudflare-tunnel-token
    networks:
      - wwb-internal
    deploy:
      mode: replicated
      replicas: 1
      restart_policy:
        condition: on-failure
# ──────────────────────────────────────────────
# Networks
# ──────────────────────────────────────────────
networks:
  wwb-internal:
    driver: overlay
    attachable: true
    driver_opts:
      com.docker.network.driver.mtu: "1200"
# ──────────────────────────────────────────────
# Secrets — all supplied externally via Docker Swarm
#
# NOTE: secrets are loaded from files under ./secrets/
# named conventionally based on the purpose of the secret.
# ──────────────────────────────────────────────
secrets:
  mongo-root-password:
    file: ./secrets/mongo-root-password.txt
  mongo-database-password:
    file: ./secrets/mongo-database-password.txt
  mongo-express-password:
    file: ./secrets/mongo-express-password.txt
  jwt-secret:
    file: ./secrets/jwt-secret.txt
  twilio-account-sid:
    file: ./secrets/twilio-account-sid.txt
  twilio-auth-token:
    file: ./secrets/twilio-auth-token.txt
  twilio-verify-service-sid:
    file: ./secrets/twilio-verify-service-sid.txt
  cloudflare-tunnel-token:
    file: ./secrets/cloudflare-tunnel-token.txt
  admin-email:
    file: ./secrets/admin-email.txt
  admin-password:
    file: ./secrets/admin-password.txt
# ──────────────────────────────────────────────
# Configs
# ──────────────────────────────────────────────
configs:
  mongo-init:
    file: ./configs/mongo/init.js
  mongo-express-entrypoint:
    file: ./configs/mongo-express/entrypoint.sh
# ──────────────────────────────────────────────
# Volumes
# ──────────────────────────────────────────────
volumes:
  mongo-data:
    driver: local
  backend-uploads:
    driver: local
