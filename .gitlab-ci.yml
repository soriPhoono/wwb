# ──────────────────────────────────────────────
# GitLab CI/CD — Build & Push Docker Images
# Triggers on merge requests targeting `main`
# ──────────────────────────────────────────────
stages:
  - build
# ──────────────────────────────────────────────
# Common configuration for Docker-in-Docker builds
# ──────────────────────────────────────────────
.docker-build:
  stage: build
  image: docker:27
  services:
    - docker:27-dind
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    # Authenticate with the GitLab Container Registry
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  rules:
    # Run on merge requests targeting main
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_TARGET_BRANCH_NAME == "main"'
# ──────────────────────────────────────────────
# Backend — Express + Node.js API
# ──────────────────────────────────────────────
build-backend:
  extends: .docker-build
  script:
    - |
      docker build \
        --tag "$CI_REGISTRY_IMAGE/wwb-backend:$CI_MERGE_REQUEST_IID" \
        --tag "$CI_REGISTRY_IMAGE/wwb-backend:latest" \
        wwb/backend
    - docker push "$CI_REGISTRY_IMAGE/wwb-backend:$CI_MERGE_REQUEST_IID"
    - docker push "$CI_REGISTRY_IMAGE/wwb-backend:latest"
# ──────────────────────────────────────────────
# Frontend — Vue 3 / Caddy static server
# ──────────────────────────────────────────────
build-frontend:
  extends: .docker-build
  script:
    - |
      docker build \
        --tag "$CI_REGISTRY_IMAGE/wwb-frontend:$CI_MERGE_REQUEST_IID" \
        --tag "$CI_REGISTRY_IMAGE/wwb-frontend:latest" \
        wwb/frontend
    - docker push "$CI_REGISTRY_IMAGE/wwb-frontend:$CI_MERGE_REQUEST_IID"
    - docker push "$CI_REGISTRY_IMAGE/wwb-frontend:latest"
